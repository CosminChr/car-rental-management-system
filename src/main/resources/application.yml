spring:
  application:
    name: car-rental-management-system
  profiles:
    default: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/carrental}
    username: ${SPRING_DATASOURCE_USERNAME:carrental}
    password: ${SPRING_DATASOURCE_PASSWORD:carrental}
    hikari:
      connection-init-sql: SET lock_timeout = '3s'
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

rental:
  min-duration: PT1H
  max-duration: P30D

springdoc:
  swagger-ui:
    path: /swagger-ui.html
