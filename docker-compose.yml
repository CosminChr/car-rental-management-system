services:
  postgres:
    image: postgres:18
    container_name: carrental-postgres
    environment:
      POSTGRES_DB: carrental
      POSTGRES_USER: carrental
      POSTGRES_PASSWORD: carrental
    ports:
      - "5432:5432"
    volumes:
      - carrental-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carrental -d carrental"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  carrental-pgdata:
